<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Emulator</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        #screen {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
        }

        #canvas,
        #game-container,
        #game {
            max-width: 100%;
            max-height: 100%;
        }

        #canvas {
            image-rendering: pixelated;
        }

        /* Hide everything else */
        #status,
        #debug,
        #touchControls,
        #gbaSaveHint,
        #fileProtocolWarning,
        #controlModal {
            display: none !important;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Emulator Display -->
    <div id="screen">
        <canvas id="canvas" width="256" height="240"></canvas>

        <div id="game-container" style="display:none;">
            <div id="game"></div>
        </div>
    </div>

    <!-- Hidden elements required by main.js -->
    <select id="systemSelect" class="hidden">
        <option value="nes">NES</option>
        <option value="gba" selected>GBA</option>
    </select>

    <select id="gbaEngineSelect" class="hidden">
        <option value="emulatorjs" selected>EmulatorJS / mGBA</option>
        <option value="iodine">IodineGBA</option>
    </select>

    <input type="file" id="romFile" class="hidden">
    <button id="controlSettingsBtn" class="hidden"></button>

    <div id="status" class="hidden"></div>
    <div id="debug" class="hidden"></div>
    <div id="gbaSaveHint" class="hidden"></div>
    <div id="touchControls" class="hidden"></div>
    <div id="fileProtocolWarning" class="hidden"></div>

    <!-- Hidden modal elements expected by controlSettings.js -->
    <div id="controlModal" class="hidden">
        <button id="closeModal"></button>
        <select id="controlSystemSelect">
            <option value="nes">NES</option>
            <option value="gba">GBA</option>
        </select>
        <div id="controlMapping"></div>
        <button id="resetControls"></button>
        <button id="saveControls"></button>
    </div>

    <script src="https://unpkg.com/jsnes@1.2.1/dist/jsnes.min.js"></script>

    <script src="emulator.js"></script>
    <script src="controls.js"></script>
    <script src="touchControls.js"></script>
    <script src="controlSettings.js"></script>
    <script src="main.js"></script>

</body>
</html>
